name: Update thesis statistics

on:
  schedule:
    # Every Monday at 06:15 UTC.
    - cron: "15 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-thesis-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch current thesis statistics
        run: python scripts/fetch_thesis_stats.py --allow-stale

      - name: Commit updated statistics
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update thesis statistics"
          file_pattern: "assets/data/thesis_stats.csv masterarbeit.html"
